<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>BATHINA PAVAN</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #000;
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    font-family: 'Rajdhani', sans-serif;
  }
  canvas {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }
  .letterbox-top, .letterbox-bottom {
    position: fixed; left: 0; right: 0;
    height: 55px; background: #000; z-index: 10;
  }
  .letterbox-top { top: 0; }
  .letterbox-bottom { bottom: 0; }
  .vignette {
    position: fixed; inset: 0;
    background: radial-gradient(ellipse at center, transparent 25%, rgba(0,0,0,0.8) 100%);
    z-index: 2; pointer-events: none;
  }
  .scanlines {
    position: fixed; inset: 0;
    background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
    z-index: 3; pointer-events: none;
  }
  .hero {
    position: fixed; inset: 0; z-index: 5;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    pointer-events: none;
  }
  .intro-label {
    font-family: 'Rajdhani', sans-serif;
    font-size: clamp(0.75rem, 1.8vw, 1rem);
    font-weight: 700;
    letter-spacing: 0.5em;
    color: #ff4500;
    text-transform: uppercase;
    opacity: 0;
    animation: slideDown 0.7s ease 0.3s forwards;
    text-shadow: 0 0 20px rgba(255,69,0,0.8);
    margin-bottom: 0.3rem;
  }
  .name {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(3.8rem, 14vw, 11rem);
    letter-spacing: 0.06em;
    line-height: 0.85;
    text-align: center;
    opacity: 0;
    animation: blastIn 1s cubic-bezier(0.22,1,0.36,1) 0.6s forwards;
  }
  .name .first {
    display: block; color: #ffffff;
    text-shadow: 0 0 40px rgba(255,255,255,0.3), 0 0 80px rgba(255,80,0,0.25),
                 3px 3px 0 #880000, 6px 6px 0 #440000;
  }
  .name .last {
    display: block; color: #ff4500;
    text-shadow: 0 0 40px rgba(255,69,0,1), 0 0 80px rgba(255,69,0,0.5),
                 3px 3px 0 #7a1a00, 6px 6px 0 #3a0a00;
    -webkit-text-stroke: 1px rgba(255,160,50,0.3);
  }
  .divider {
    width: 0; height: 2px;
    background: linear-gradient(90deg, transparent, #ff4500, #ffaa00, #ff4500, transparent);
    margin: 0.55rem auto;
    animation: expandLine 1s ease 1.1s forwards;
    box-shadow: 0 0 10px #ff4500;
  }
  .stat-block {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.55rem;
    margin-top: 0.2rem;
  }
  .stat-row {
    display: flex;
    align-items: center;
    gap: 0.7rem;
    opacity: 0;
    font-family: 'Rajdhani', sans-serif;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .stat-row:nth-child(1){ animation: slideUp 0.7s ease 1.3s forwards; }
  .stat-row:nth-child(2){ animation: slideUp 0.7s ease 1.55s forwards; }
  .stat-row:nth-child(3){ animation: slideUp 0.7s ease 1.8s forwards; }

  .stat-icon {
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    filter: drop-shadow(0 0 6px currentColor);
  }
  .stat-text {
    font-size: clamp(0.75rem, 2vw, 1.1rem);
    color: rgba(255,230,180,0.92);
    text-shadow: 0 0 12px rgba(255,150,0,0.5);
  }
  .stat-text strong {
    color: #ff4500;
    font-size: 1.1em;
    text-shadow: 0 0 14px rgba(255,69,0,0.9);
  }
  .stat-badge {
    background: rgba(255,69,0,0.15);
    border: 1px solid rgba(255,69,0,0.4);
    border-radius: 3px;
    padding: 0.15rem 0.6rem;
    font-size: clamp(0.6rem, 1.4vw, 0.8rem);
    color: #ffaa44;
    letter-spacing: 0.2em;
    white-space: nowrap;
  }
  .stat-badge.live {
    border-color: rgba(0,255,120,0.5);
    background: rgba(0,255,120,0.08);
    color: #00ff88;
    animation: pulseBadge 1.5s ease infinite;
  }
  @keyframes pulseBadge {
    0%,100%{ box-shadow: 0 0 4px rgba(0,255,120,0.3); }
    50%    { box-shadow: 0 0 14px rgba(0,255,120,0.7); }
  }
  .corner {
    position: fixed; width: 55px; height: 55px; z-index: 6;
  }
  .corner::before, .corner::after {
    content: ''; position: absolute;
    background: #ff4500; box-shadow: 0 0 8px #ff4500;
  }
  .corner::before { width: 100%; height: 2px; top: 0; left: 0; }
  .corner::after  { width: 2px; height: 100%; top: 0; left: 0; }
  .corner.tl { top: 62px; left: 18px; }
  .corner.tr { top: 62px; right: 18px; transform: scaleX(-1); }
  .corner.bl { bottom: 62px; left: 18px; transform: scaleY(-1); }
  .corner.br { bottom: 62px; right: 18px; transform: scale(-1); }
  @keyframes slideDown { from{opacity:0;transform:translateY(-20px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slideUp   { from{opacity:0;transform:translateY(20px)}  to{opacity:1;transform:translateY(0)} }
  @keyframes blastIn   { from{opacity:0;transform:scale(1.35);filter:blur(12px)} to{opacity:1;transform:scale(1);filter:blur(0)} }
  @keyframes expandLine{ from{width:0} to{width:min(480px,58vw)} }
</style>
</head>
<body>
<canvas id="scene"></canvas>
<div class="vignette"></div>
<div class="scanlines"></div>
<div class="letterbox-top"></div>
<div class="letterbox-bottom"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>
<div class="hero">
  <div class="intro-label">✦ &nbsp; I AM &nbsp; ✦</div>
  <div class="name">
    <span class="first">BATHINA</span>
    <span class="last">PAVAN</span>
  </div>
  <div class="divider"></div>
  <div class="stat-block">
    <div class="stat-row">
      <span class="stat-icon">☁️</span>
      <span class="stat-text">Been learning <strong>AWS &amp; DevOps</strong> for months</span>
      <span class="stat-badge">✔ IN PROGRESS</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">🐳</span>
      <span class="stat-text">Currently mastering <strong>Docker</strong></span>
      <span class="stat-badge live">⬤ &nbsp;LIVE NOW</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">🔥</span>
      <span class="stat-text">Building skills &nbsp;·&nbsp; shipping fast &nbsp;·&nbsp; levelling up daily</span>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('scene');
const ctx    = canvas.getContext('2d');
let W, H;
function resize(){ W = canvas.width = innerWidth; H = canvas.height = innerHeight; }
resize(); window.addEventListener('resize', resize);

const rand    = (a,b) => a + Math.random()*(b-a);
const randInt = (a,b) => Math.floor(rand(a, b+1));

function shade(hex, amt){
  let r=parseInt(hex.slice(1,3),16), g=parseInt(hex.slice(3,5),16), b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,Math.max(0,r+amt)); g=Math.min(255,Math.max(0,g+amt)); b=Math.min(255,Math.max(0,b+amt));
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

/* ── Smoke ─────────────────────────────────────────────── */
let smokes = [];
class Smoke {
  constructor(x,y){ this.x=x; this.y=y; this.r=rand(4,14); this.alpha=rand(0.1,0.3);
    this.vx=rand(-0.4,0.4); this.vy=rand(-1.4,-0.4); this.grow=rand(0.3,0.7); this.life=1; }
  update(){ this.x+=this.vx; this.y+=this.vy; this.r+=this.grow; this.life-=0.013; }
  draw(){
    if(this.life<=0)return;
    ctx.save(); ctx.globalAlpha=this.life*0.22;
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,'rgba(210,160,70,0.7)'); g.addColorStop(1,'rgba(30,30,30,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

/* ── Spark ─────────────────────────────────────────────── */
let sparks = [];
class Spark {
  constructor(x,y){ this.x=x; this.y=y; this.vx=rand(-5,5); this.vy=rand(-6,1);
    this.life=rand(0.5,1); this.r=rand(1,3); this.col=Math.random()>.5?'#ffcc00':'#ff6600'; }
  update(){ this.x+=this.vx; this.y+=this.vy; this.vy+=0.18; this.life-=0.04; }
  draw(){
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life);
    ctx.fillStyle=this.col; ctx.shadowColor=this.col; ctx.shadowBlur=7;
    ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

/* ── Glow Flash ────────────────────────────────────────── */
let flashes=[];
class GlowFlash {
  constructor(x,y){ this.x=x; this.y=y; this.r=rand(8,25); this.life=1; }
  update(){ this.r+=5; this.life-=0.14; }
  draw(){
    if(this.life<=0)return;
    ctx.save(); ctx.globalAlpha=Math.max(0,this.life*0.55);
    const g=ctx.createRadialGradient(this.x,this.y,0,this.x,this.y,this.r);
    g.addColorStop(0,'rgba(255,255,180,1)'); g.addColorStop(0.4,'rgba(255,130,0,0.7)'); g.addColorStop(1,'rgba(255,40,0,0)');
    ctx.fillStyle=g; ctx.beginPath(); ctx.arc(this.x,this.y,this.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  }
}

/* ── Bullet ────────────────────────────────────────────── */
let bullets=[];
class Bullet {
  constructor(){ this.reset(true); }
  reset(spread=false){
    this.fromLeft=Math.random()>.5;
    this.y=rand(H*0.1, H*0.88);
    this.x=spread ? rand(0,W) : (this.fromLeft ? -25 : W+25);
    this.speed=rand(16,34)*(this.fromLeft?1:-1);
    this.len=rand(20,55); this.alpha=rand(0.65,1);
    this.glow=Math.random()>.35; this.angle=rand(-0.05,0.05);
  }
  update(){
    this.x+=this.speed; this.y+=this.speed*Math.tan(this.angle);
    if(Math.random()>.65) smokes.push(new Smoke(this.x,this.y));
  }
  draw(){
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.angle+(this.fromLeft?0:Math.PI));
    ctx.globalAlpha=this.alpha;
    const g2=ctx.createLinearGradient(0,0,this.len,0);
    g2.addColorStop(0,'rgba(255,220,50,0)'); g2.addColorStop(0.5,'rgba(255,240,100,0.95)'); g2.addColorStop(1,'rgba(255,170,10,0.2)');
    ctx.strokeStyle=this.glow?g2:'rgba(255,200,80,0.75)';
    ctx.lineWidth=this.glow?2.5:1.5;
    if(this.glow){ ctx.shadowColor='#ffcc00'; ctx.shadowBlur=9; }
    ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(this.len,0); ctx.stroke();
    ctx.beginPath(); ctx.arc(this.len,0,2,0,Math.PI*2);
    ctx.fillStyle='#fff'; ctx.shadowColor='#fff'; ctx.shadowBlur=7; ctx.fill();
    ctx.restore();
  }
  dead(){ return this.fromLeft? this.x>W+70 : this.x<-70; }
}

/* ── Gun silhouette ────────────────────────────────────── */
let guns=[];
class Gun {
  constructor(){
    this.x=rand(0,W); this.y=rand(H*.05,H*.9);
    this.scale=rand(0.35,0.85); this.alpha=rand(0.04,0.11);
    this.vx=rand(-0.5,0.5); this.vy=rand(-0.15,0.15);
    this.rot=rand(-0.5,0.5); this.rotSpd=rand(-0.003,0.003);
    this.flip=Math.random()>.5?1:-1;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy; this.rot+=this.rotSpd;
    if(this.x<-160||this.x>W+160) this.vx*=-1;
    if(this.y<-90 ||this.y>H+90)  this.vy*=-1;
  }
  draw(){
    ctx.save(); ctx.translate(this.x,this.y); ctx.rotate(this.rot);
    ctx.scale(this.flip*this.scale, this.scale); ctx.globalAlpha=this.alpha;
    ctx.fillStyle='#ff5500'; ctx.strokeStyle='#ff7700'; ctx.lineWidth=2/this.scale;
    // body
    ctx.beginPath(); ctx.rect(-10,-6,90,12); ctx.fill(); ctx.stroke();
    // slide
    ctx.beginPath(); ctx.rect(10,-13,58,7); ctx.fill(); ctx.stroke();
    // grip
    ctx.beginPath(); ctx.moveTo(10,6); ctx.lineTo(5,54); ctx.lineTo(30,54); ctx.lineTo(35,6); ctx.closePath(); ctx.fill(); ctx.stroke();
    // trigger guard
    ctx.beginPath(); ctx.moveTo(25,6); ctx.quadraticCurveTo(25,28,40,28); ctx.quadraticCurveTo(55,28,55,6);
    ctx.strokeStyle='rgba(255,120,50,0.6)'; ctx.stroke();
    // barrel tip
    ctx.beginPath(); ctx.arc(80,0,4.5,0,Math.PI*2); ctx.fillStyle='#111'; ctx.fill();
    ctx.restore();
  }
}

/* ── Cars ───────────────────────────────────────────────── */
function drawRangeRover(flip, col){
  ctx.save(); ctx.scale(flip,1);
  // shadow
  ctx.globalAlpha*=0.5;
  ctx.fillStyle='rgba(0,0,0,0.5)'; ctx.beginPath(); ctx.ellipse(95,58,105,11,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha/=0.5;
  // body
  ctx.fillStyle=col; ctx.beginPath(); ctx.roundRect(0,12,205,44,[6,6,4,4]); ctx.fill();
  // roof boxy
  ctx.fillStyle=shade(col,-18); ctx.beginPath(); ctx.roundRect(28,-26,135,40,[7,7,0,0]); ctx.fill();
  // windshield
  ctx.fillStyle='rgba(100,210,255,0.28)'; ctx.beginPath();
  ctx.moveTo(140,-25); ctx.lineTo(160,12); ctx.lineTo(100,12); ctx.lineTo(106,-25); ctx.closePath(); ctx.fill();
  // rear glass
  ctx.fillStyle='rgba(100,210,255,0.2)'; ctx.beginPath();
  ctx.moveTo(35,-25); ctx.lineTo(28,12); ctx.lineTo(86,12); ctx.lineTo(90,-25); ctx.closePath(); ctx.fill();
  // wheels
  [38,165].forEach(wx=>{
    ctx.beginPath(); ctx.arc(wx,57,23,0,Math.PI*2); ctx.fillStyle='#0d0d0d'; ctx.fill();
    ctx.beginPath(); ctx.arc(wx,57,15,0,Math.PI*2); ctx.fillStyle='#888'; ctx.fill();
    ctx.beginPath(); ctx.arc(wx,57,5,0,Math.PI*2); ctx.fillStyle='#ccc'; ctx.fill();
    for(let i=0;i<5;i++){ const a=i/5*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(wx,57); ctx.lineTo(wx+Math.cos(a)*15,57+Math.sin(a)*15);
      ctx.strokeStyle='#444'; ctx.lineWidth=2; ctx.stroke(); }
  });
  // headlight + glow
  ctx.fillStyle='rgba(255,240,170,0.95)'; ctx.fillRect(198,20,10,10);
  ctx.shadowColor='rgba(255,230,80,0.9)'; ctx.shadowBlur=20; ctx.fillRect(198,20,10,10); ctx.shadowBlur=0;
  ctx.restore();
}

function drawMustang(flip, col){
  ctx.save(); ctx.scale(flip,1);
  // shadow
  ctx.fillStyle='rgba(0,0,0,0.4)'; ctx.beginPath(); ctx.ellipse(105,54,115,10,0,0,Math.PI*2); ctx.fill();
  // body low muscle
  ctx.fillStyle=col; ctx.beginPath();
  ctx.moveTo(0,47); ctx.lineTo(12,22); ctx.lineTo(62,12); ctx.lineTo(82,2);
  ctx.lineTo(156,2); ctx.lineTo(188,16); ctx.lineTo(215,22); ctx.lineTo(215,47); ctx.closePath(); ctx.fill();
  // hood scoop
  ctx.fillStyle=shade(col,-28); ctx.beginPath(); ctx.ellipse(158,10,32,7,-0.2,0,Math.PI*2); ctx.fill();
  // roof
  ctx.fillStyle=shade(col,-14); ctx.beginPath();
  ctx.moveTo(67,12); ctx.lineTo(78,-20); ctx.lineTo(145,-20); ctx.lineTo(162,12); ctx.closePath(); ctx.fill();
  // windshield
  ctx.fillStyle='rgba(120,225,255,0.3)'; ctx.beginPath();
  ctx.moveTo(80,-19); ctx.lineTo(72,11); ctx.lineTo(112,11); ctx.lineTo(118,-19); ctx.closePath(); ctx.fill();
  // side stripe
  ctx.fillStyle=shade(col,28); ctx.fillRect(30,30,165,4);
  // wheels
  [40,180].forEach(wx=>{
    ctx.beginPath(); ctx.arc(wx,54,21,0,Math.PI*2); ctx.fillStyle='#0d0d0d'; ctx.fill();
    ctx.beginPath(); ctx.arc(wx,54,13,0,Math.PI*2); ctx.fillStyle='#777'; ctx.fill();
    ctx.beginPath(); ctx.arc(wx,54,4,0,Math.PI*2); ctx.fillStyle='#ddd'; ctx.fill();
    for(let i=0;i<6;i++){ const a=i/6*Math.PI*2;
      ctx.beginPath(); ctx.moveTo(wx,54); ctx.lineTo(wx+Math.cos(a)*13,54+Math.sin(a)*13);
      ctx.strokeStyle='#444'; ctx.lineWidth=2; ctx.stroke(); }
  });
  // headlight
  ctx.beginPath(); ctx.ellipse(210,30,7,5,0,0,Math.PI*2);
  ctx.fillStyle='rgba(255,240,190,0.95)'; ctx.fill();
  ctx.shadowColor='rgba(255,230,80,0.95)'; ctx.shadowBlur=25; ctx.fill(); ctx.shadowBlur=0;
  // exhaust puffs
  if(Math.random()>.4) smokes.push(new Smoke(flip>0?-5:215, 40));
  ctx.restore();
}

const RR_COLS = ['#222222','#1a341a','#1a1a34','#341a1a','#2a2a14'];
const MS_COLS = ['#8B0000','#003366','#111111','#004400','#553300','#7a3a00'];

let cars=[];
class Car {
  constructor(){
    this.type=Math.random()>.5?'rr':'ms';
    this.fromLeft=Math.random()>.5;
    this.lane=rand(H*0.46, H*0.87);
    this.x=this.fromLeft? -260 : W+260;
    this.speed=rand(2.2,5.5)*(this.fromLeft?1:-1);
    this.scale=rand(0.42,0.82);
    this.alpha=rand(0.5,0.9);
    this.col=this.type==='rr'? RR_COLS[randInt(0,RR_COLS.length-1)] : MS_COLS[randInt(0,MS_COLS.length-1)];
  }
  update(){
    this.x+=this.speed;
    if(Math.abs(this.speed)>3&&Math.random()>.65)
      smokes.push(new Smoke(this.x+(this.fromLeft?-10:(220*this.scale)), this.lane+28*this.scale));
  }
  draw(){
    ctx.save(); ctx.globalAlpha=this.alpha; ctx.translate(this.x, this.lane); ctx.scale(this.scale,this.scale);
    // motion blur ghosts
    for(let i=1;i<=3;i++){
      ctx.save(); ctx.globalAlpha=this.alpha*(0.07/i); ctx.translate(-this.speed*i*1.6,0);
      if(this.type==='rr') drawRangeRover(this.fromLeft?1:-1, this.col);
      else                 drawMustang(this.fromLeft?1:-1, this.col);
      ctx.restore();
    }
    if(this.type==='rr') drawRangeRover(this.fromLeft?1:-1, this.col);
    else                 drawMustang(this.fromLeft?1:-1, this.col);
    ctx.restore();
  }
  dead(){ return this.fromLeft? this.x>W+310 : this.x<-310; }
}
for(let i=0;i<6;i++) cars.push(new Car());

/* ── Speed lines ───────────────────────────────────────── */
const speedLines = Array.from({length:45},()=>({
  x:rand(0,W), y:rand(0,H), len:rand(50,190),
  speed:rand(7,22), alpha:rand(0.025,0.1), w:rand(1,3)
}));

/* ── Stars ─────────────────────────────────────────────── */
const stars = Array.from({length:130},()=>({
  x:rand(0,1), y:rand(0,1), r:rand(0.5,1.8),
  alpha:rand(0.08,0.55), speed:rand(0.0001,0.0005)
}));

/* ── Init bullets & guns ───────────────────────────────── */
for(let i=0;i<14;i++){ const b=new Bullet(); b.x=rand(0,W); bullets.push(b); }
for(let i=0;i<16;i++) guns.push(new Gun());

/* ── Road ──────────────────────────────────────────────── */
function drawRoad(){
  const ry=H*0.67, rh=H*0.36;
  const rg=ctx.createLinearGradient(0,ry,0,H);
  rg.addColorStop(0,'#0e0e0e'); rg.addColorStop(1,'#1c1c1c');
  ctx.fillStyle=rg; ctx.fillRect(0,ry,W,rh);
  ctx.setLineDash([38,28]);
  ctx.strokeStyle='rgba(255,140,0,0.18)'; ctx.lineWidth=3;
  ctx.beginPath(); ctx.moveTo(0,ry+rh*0.42); ctx.lineTo(W,ry+rh*0.42); ctx.stroke();
  ctx.setLineDash([]);
  ctx.strokeStyle='rgba(255,255,255,0.07)'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(0,ry); ctx.lineTo(W,ry); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(0,H-58); ctx.lineTo(W,H-58); ctx.stroke();
}

/* ── Main loop ─────────────────────────────────────────── */
let t=0;
function loop(){
  t++;
  ctx.clearRect(0,0,W,H);

  // sky
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#040408'); sky.addColorStop(0.45,'#0c0508'); sky.addColorStop(0.72,'#110904'); sky.addColorStop(1,'#040408');
  ctx.fillStyle=sky; ctx.fillRect(0,0,W,H);
  // horizon glow
  const hg=ctx.createRadialGradient(W/2,H*0.62,0,W/2,H*0.62,W*0.65);
  hg.addColorStop(0,'rgba(255,55,0,0.09)'); hg.addColorStop(0.5,'rgba(200,25,0,0.04)'); hg.addColorStop(1,'transparent');
  ctx.fillStyle=hg; ctx.fillRect(0,0,W,H);

  // speed lines
  speedLines.forEach(sl=>{
    sl.x+=sl.speed; if(sl.x>W+sl.len) sl.x=-sl.len;
    ctx.save(); ctx.globalAlpha=sl.alpha;
    ctx.strokeStyle='rgba(255,110,0,0.7)'; ctx.lineWidth=sl.w;
    ctx.beginPath(); ctx.moveTo(sl.x,sl.y); ctx.lineTo(sl.x-sl.len,sl.y); ctx.stroke(); ctx.restore();
  });

  // stars
  stars.forEach(s=>{
    s.x+=s.speed; if(s.x>1) s.x=0;
    ctx.save(); ctx.globalAlpha=s.alpha*(0.5+0.5*Math.sin(t*0.018+s.y*10));
    ctx.fillStyle='#fff'; ctx.beginPath(); ctx.arc(s.x*W,s.y*H,s.r,0,Math.PI*2); ctx.fill(); ctx.restore();
  });

  drawRoad();

  // gun silhouettes
  guns.forEach(g=>{ g.update(); g.draw(); });

  // cars
  if(t%110===0 && cars.length<9) cars.push(new Car());
  cars=cars.filter(c=>!c.dead());
  cars.sort((a,b)=>a.lane-b.lane);
  cars.forEach(c=>{ c.update(); c.draw(); });

  // bullets
  bullets=bullets.filter(b=>!b.dead());
  while(bullets.length<16) bullets.push(new Bullet());
  bullets.forEach(b=>{ b.update(); b.draw(); });

  // impact sparks at edges
  bullets.forEach(b=>{
    if((b.fromLeft&&b.x>W-10)||(!b.fromLeft&&b.x<10)){
      for(let i=0;i<10;i++) sparks.push(new Spark(b.x,b.y));
      flashes.push(new GlowFlash(b.x,b.y));
    }
  });

  sparks=sparks.filter(s=>s.life>0); sparks.forEach(s=>{ s.update(); s.draw(); });
  flashes=flashes.filter(f=>f.life>0); flashes.forEach(f=>{ f.update(); f.draw(); });
  smokes=smokes.filter(s=>s.life>0); smokes.forEach(s=>{ s.update(); s.draw(); });

  requestAnimationFrame(loop);
}
loop();
</script>
</body>
</html>
